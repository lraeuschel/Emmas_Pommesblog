name: Deploy Flutter Web to GitHub Pages
permissions:
  contents: write

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9

      - name: Install dependencies
        working-directory: emmas_pommes_blog
        run: flutter pub get

      - name: Build web
        working-directory: emmas_pommes_blog
        run: |
          flutter build web --release \
            --base-href /Emmas_Pommesblog/ \
            --dart-define=PROJECT_URL=${{ secrets.PROJECT_URL }} \
            --dart-define=PUBLISHABLE_KEY=${{ secrets.PUBLISHABLE_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: emmas_pommes_blog/build/web
